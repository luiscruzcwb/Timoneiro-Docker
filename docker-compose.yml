services:
  timoneiro:
    build: .
    container_name: timoneiro
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - timoneiro_data:/data
    environment:
      - TIMONEIRO_DB_PATH=/data/timoneiro.db
      - TIMONEIRO_PORT=8080
      - TIMONEIRO_CHECK_INTERVAL=300
    labels:
      - "dev.timoneiro.enable=false"

volumes:
  timoneiro_data:
    driver: local