services:
  timoneiro-agent:
    image: timoneiro-agent:latest
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: timoneiro-agent
    restart: unless-stopped
    ports:
      - "1895:1895"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TIMONEIRO_AGENT_TOKEN=${TIMONEIRO_AGENT_TOKEN}
      - TIMONEIRO_AGENT_PORT=1895
    labels:
      - "dev.timoneiro.enable=false"
